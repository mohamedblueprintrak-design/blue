# Dependabot Configuration
# Automates dependency updates

version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Dubai'
    open-pull-requests-limit: 10
    reviewers:
      - 'your-username'
    assignees:
      - 'your-username'
    commit-message:
      prefix: 'deps'
      prefix-development: 'deps(dev)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
    groups:
      production-dependencies:
        dependency-type: 'production'
      development-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Dubai'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'ci'
    labels:
      - 'github-actions'
      - 'dependencies'

  # Enable version updates for Docker
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Dubai'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'docker'
    labels:
      - 'docker'
      - 'dependencies'
