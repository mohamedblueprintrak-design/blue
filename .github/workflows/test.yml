# BluePrint - Comprehensive Testing Pipeline
# Runs on push to main/develop and PRs targeting those branches
# Uses bun for fast installs, PostgreSQL + Redis service containers for database tests

name: Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://blueprint:blueprint@localhost:5432/blueprint_test
  REDIS_URL: redis://localhost:6379/0
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  BUN_VERSION: "1.2.5"

jobs:
  install-and-cache:
    name: ⚡ Install & Cache
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        id: cache-modules
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-modules-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        if: steps.cache-modules.outputs.cache-hit != 'true'
      - run: bunx prisma generate
      - uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: node_modules
          retention-days: 1

  type-check:
    name: 🔍 Type Check
    runs-on: ubuntu-latest
    needs: install-and-cache
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules
      - run: bunx prisma generate
      - run: bunx tsc --noEmit 2>&1 | tee tsc-output.txt
        continue-on-error: true

  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    needs: install-and-cache
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules
      - run: bunx eslint . --max-warnings 0
        continue-on-error: true

  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: install-and-cache
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: blueprint
          POSTGRES_PASSWORD: blueprint
          POSTGRES_DB: blueprint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U blueprint"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules
      - run: bunx prisma db push --skip-generate
      - run: bunx prisma generate
      - run: bunx jest --coverage --ci --forceExit --detectOpenHandles 2>&1 | tee test-output.txt
        env:
          DATABASE_URL: postgresql://blueprint:blueprint@localhost:5432/blueprint_test
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: install-and-cache
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: blueprint
          POSTGRES_PASSWORD: blueprint
          POSTGRES_DB: blueprint_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U blueprint"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules
      - run: bunx prisma db push --skip-generate
      - run: bunx prisma generate
      - run: bunx jest __tests__/integration --ci --forceExit --detectOpenHandles --runInBand 2>&1 | tee integration-output.txt
        env:
          DATABASE_URL: postgresql://blueprint:blueprint@localhost:5432/blueprint_integration
          REDIS_URL: redis://localhost:6379/0
        continue-on-error: true

  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: install-and-cache
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: blueprint
          POSTGRES_PASSWORD: blueprint
          POSTGRES_DB: blueprint_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U blueprint"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules
      - run: bunx playwright install --with-deps chromium
      - run: bunx prisma db push --skip-generate
      - run: bunx prisma generate
      - run: bun run build
        env:
          DATABASE_URL: postgresql://blueprint:blueprint@localhost:5432/blueprint_e2e
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          STRIPE_SECRET_KEY: sk_test_dummy
      - run: |
          bun run start &
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          DATABASE_URL: postgresql://blueprint:blueprint@localhost:5432/blueprint_e2e
          REDIS_URL: redis://localhost:6379/0
          PORT: 3000
      - run: bunx playwright test --reporter=list 2>&1 | tee playwright-output.txt
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
