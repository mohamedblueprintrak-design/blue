# ============================================
# BluePrint SaaS - Docker Compose for Production
# ============================================
# 
# SECURITY:
# - No exposed database/redis ports (only accessible from app)
# - Secrets from environment variables
# - Redis with password authentication
# - Nginx as reverse proxy with SSL
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required environment variables (set in .env or CI/CD):
#   - DATABASE_PASSWORD
#   - JWT_SECRET (min 32 characters)
#   - REDIS_PASSWORD
#   - NEXT_PUBLIC_APP_URL
#   - SMTP_HOST, SMTP_USER, SMTP_PASS
#   - STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET

services:
  # ============================================
  # Application Service
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blueprint-app
    restart: unless-stopped
    # SECURITY: Only expose to nginx, not directly to internet
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      # SECURITY: Use secrets from environment
      - DATABASE_URL=postgresql://blueprint:${DATABASE_PASSWORD}@postgres:5432/blueprint
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      # SMTP Configuration
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      # Stripe Configuration
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blueprint-network
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    read_only: false
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE

  # ============================================
  # PostgreSQL Database - SECURED
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: blueprint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blueprint
      # SECURITY: Password from environment variable
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: blueprint
    # SECURITY: NO exposed ports - only accessible from app container
    # Remove the ports section entirely for production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blueprint-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blueprint -d blueprint"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    # SECURITY: Limit resources
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ============================================
  # Redis Cache - SECURED
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: blueprint-redis
    restart: unless-stopped
    # SECURITY: NO exposed ports - only accessible from app container
    volumes:
      - redis_data:/data
    networks:
      - blueprint-network
    # SECURITY: Use password authentication
    command: >
      redis-server 
      --appendonly yes 
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ============================================
  # Nginx Reverse Proxy - PRODUCTION REQUIRED
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: blueprint-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - blueprint-network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  # ============================================
  # Certbot for SSL Auto-Renewal
  # ============================================
  certbot:
    image: certbot/certbot
    container_name: blueprint-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Renew certificates every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - blueprint-network

# ============================================
# Networks - Internal Only
# ============================================
networks:
  blueprint-network:
    driver: bridge
    internal: false  # Allow external access only through nginx

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
