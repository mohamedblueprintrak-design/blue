# ============================================
# BluePrint SaaS - Docker Compose for Development
# ============================================
# Development orchestration with security best practices
#
# SECURITY NOTE: All sensitive values should come from .env file
# Copy .env.example to .env and fill in your values
#
# Usage:
#   cp .env.example .env
#   # Edit .env with your values
#   docker-compose up -d

services:
  # ============================================
  # Application Service
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: blueprint-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      # SECURITY: All secrets from environment variables
      - DATABASE_URL=postgresql://blueprint:${DATABASE_PASSWORD:-dev_password_change_me}@postgres:5432/blueprint
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-dev_redis_password}@redis:6379
      # SMTP Configuration
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      # Stripe Configuration
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blueprint-network
    volumes:
      - .:/app
      - uploads:/app/uploads
      - /app/node_modules

  # ============================================
  # PostgreSQL Database - SECURED
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: blueprint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blueprint
      # SECURITY: Password from environment variable
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-dev_password_change_me}
      POSTGRES_DB: blueprint
    # SECURITY: In development, keep ports for debugging
    # In production, remove this section entirely
    ports:
      - "127.0.0.1:5432:5432"  # Only localhost access
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blueprint-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blueprint -d blueprint"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis Cache - SECURED
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: blueprint-redis
    restart: unless-stopped
    # SECURITY: In development, keep ports for debugging
    # In production, remove this section entirely
    ports:
      - "127.0.0.1:6379:6379"  # Only localhost access
    volumes:
      - redis_data:/data
    networks:
      - blueprint-network
    # SECURITY: Use password authentication
    command: >
      redis-server 
      --appendonly yes 
      --requirepass ${REDIS_PASSWORD:-dev_redis_password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Nginx Reverse Proxy (Optional for Production)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: blueprint-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - blueprint-network
    profiles:
      - production

  # ============================================
  # Certbot for SSL (Optional for Production)
  # ============================================
  certbot:
    image: certbot/certbot
    container_name: blueprint-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - blueprint-network
    profiles:
      - production

# ============================================
# Networks
# ============================================
networks:
  blueprint-network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
